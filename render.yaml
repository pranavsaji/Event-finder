services:
  - type: web
    name: sf-events-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Supabase connection string in dashboard
      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after frontend deploy
      - key: CACHE_TTL_MINUTES
        value: "30"
      - key: RATE_LIMIT
        value: "60"
      - key: RATE_WINDOW
        value: "60"
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: YELP_API_KEY
        sync: false
